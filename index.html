<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 킥보드 통합 민원 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gradient-to-tr from-slate-100 to-indigo-50 min-h-screen flex items-center justify-center p-3">

    <div class="w-full max-w-md bg-white p-5 rounded-2xl shadow-xl border border-slate-200 space-y-4">
        <div class="text-center">
            <h1 class="text-xl font-black text-indigo-900">🚦 킥보드 불법주차 신고</h1>
            <p id="subTitleText" class="text-[11px] font-semibold text-indigo-600 mt-1 bg-indigo-50 py-1.5 px-2 rounded-lg">📷 기기의 QR코드를 카메라 프레임에 비춰주세요.</p>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button type="button" onclick="switchMode('qr')" id="btnQr" class="p-2.5 rounded-xl font-bold border-2 border-indigo-600 bg-indigo-50 text-indigo-600 text-xs cursor-pointer transition-all">📷 QR코드 스캔</button>
            <button type="button" onclick="switchMode('manual')" id="btnManual" class="p-2.5 rounded-xl font-bold border-2 border-slate-200 text-slate-600 text-xs cursor-pointer transition-all">⌨️ ID 직접 입력</button>
        </div>

        <form class="space-y-3.5">
            <div id="qrContainer" class="block space-y-2"><div id="reader" class="w-full overflow-hidden rounded-xl border border-slate-300 bg-slate-50"></div></div>
            <div id="manualContainer" class="hidden">
                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">킥보드 고유 ID</label>
                <input type="text" id="scooterId" placeholder="예: GCOO-101, XING-201" class="w-full p-2.5 border border-slate-300 rounded-xl font-mono uppercase text-base focus:outline-indigo-500">
            </div>
            
            <div>
                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">방치 지역 위치</label>
                <select id="locationType" class="w-full p-2.5 border border-slate-300 rounded-xl bg-white text-xs focus:outline-indigo-500 appearance-none">
                    <option value="일반 보행로(인도)">일반 보행로(인도)</option>
                    <option value="점자블록 위">점자블록 위</option>
                    <option value="횡단보도">횡단보도</option>
                    <option value="버스정류장 앞">버스정류장 앞</option>
                    <option value="소화전 앞">소화전 앞</option>
                </select>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">⚠️ 구체적인 방해 형태</label>
                <select id="obstructionType" class="w-full p-2.5 border border-slate-300 rounded-xl bg-white text-xs focus:outline-indigo-500 text-amber-600 font-bold appearance-none">
                    <option value="해당 없음 (단순 주차)">해당 없음 (단순 주차)</option>
                    <option value="통행을 완전히 막음 (길막)">통행을 완전히 막음 (길막)</option>
                    <option value="상가/건물 출입구를 막음">상가/건물 출입구를 막음</option>
                    <option value="골목길 코너/모퉁이 시야 방해">골목길 코너/모퉁이 시야 방해</option>
                    <option value="차도나 자전거도로 침범">차도나 자전거도로 침범</option>
                </select>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-slate-600 uppercase mb-1">📸 불법 주정차 현장 사진 첨부 (AI 검증 필수)</label>
                <div class="relative border-2 border-dashed border-slate-300 rounded-xl p-3 bg-slate-50 text-center hover:bg-slate-100/50 transition-all">
                    <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div id="uploadPlaceholder" class="space-y-0.5"><p class="text-xs font-semibold text-slate-700">스마트폰 사진첩에서 선택</p></div>
                    <img id="imagePreview" class="hidden max-h-24 mx-auto rounded-lg shadow-sm border">
                </div>
            </div>
            <button type="button" onclick="submitReport()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl font-bold text-xs cursor-pointer shadow-md">신고 접수 및 해당 소속사 기사 배정</button>
        </form>
        
        <div id="resultBox" class="mt-3 p-3 rounded-xl bg-slate-900 text-emerald-400 font-mono text-[11px] hidden whitespace-pre-line leading-relaxed"></div>
        
        <div id="timelineBox" class="border-t border-slate-100 pt-3 hidden space-y-2">
            <p class="text-[11px] font-bold text-slate-700 flex items-center gap-1.5">📡 실시간 민원 처리 추적</p>
            <div class="flex justify-between items-center text-[10px] relative pt-1">
                <div class="absolute top-4 left-0 right-0 h-0.5 bg-slate-200 z-0"></div>
                <div id="timelineProgress" class="absolute top-4 left-0 h-0.5 bg-indigo-500 z-0 transition-all" style="width: 0%;"></div>
                <div class="flex flex-col items-center z-10 w-1/3"><div id="step1Dot" class="w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 text-[10px]">1</div><span id="step1Text" class="text-slate-400 font-medium">민원 접수</span></div>
                <div class="flex flex-col items-center z-10 w-1/3"><div id="step2Dot" class="w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 text-[10px]">2</div><span id="step2Text" class="text-slate-400 font-medium">과태료 부과</span></div>
                <div class="flex flex-col items-center z-10 w-1/3"><div id="step3Dot" class="w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 text-[10px]">3</div><span id="step3Text" class="text-slate-400 font-medium">기사 출동중</span></div>
            </div>
        </div>
        <div class="text-center pt-1 border-t border-slate-100"><a href="driver.html" class="text-[11px] text-indigo-600 font-bold hover:underline">🚚 기사용 대시보드 화면으로 이동 ➔</a></div>
    </div>

    <script>
        let html5QrcodeScanner = null; let isImageAttached = false;
        const BASE_WEIGHTS = {"일반 보행로(인도)": 2, "점자블록 위": 5, "횡단보도": 5, "버스정류장 앞": 4, "소화전 앞": 4};
        const OBSTRUCTION_BONUS = {"해당 없음 (단순 주차)": 0, "통행을 완전히 막음 (길막)": 4, "상가/건물 출입구를 막음": 3, "골목길 코너/모퉁이 시야 방해": 3, "차도나 자전거도로 침범": 2};
        const last_ride_db = {
            "GCOO-101": {"brand": "지쿠(GCOO)", "user_id": "cau_student1", "region": "내리 대학가 원룸촌", "lat": 37.0101, "lng": 127.2345},
            "GCOO-102": {"brand": "지쿠(GCOO)", "user_id": "cau_student2", "region": "대덕면 행정센터", "lat": 37.0125, "lng": 127.2288},
            "XING-201": {"brand": "씽씽", "user_id": "cau_student3", "region": "내리 대학가 원룸촌", "lat": 37.0095, "lng": 127.2360},
            "BEAM-301": {"brand": "빔(BEAM)", "user_id": "cau_delivery", "region": "중앙대 정문 광장", "lat": 37.0118, "lng": 127.2321}
        };

        function switchMode(mode) {
            const qrContainer = document.getElementById('qrContainer'); const manualContainer = document.getElementById('manualContainer');
            const btnQr = document.getElementById('btnQr'); const btnManual = document.getElementById('btnManual'); const subTitleText = document.getElementById('subTitleText');
            if (mode === 'qr') {
                qrContainer.className = "block space-y-2"; manualContainer.className = "hidden";
                btnQr.className = "p-2.5 rounded-xl font-bold border-2 border-indigo-600 bg-indigo-50 text-indigo-600 text-xs cursor-pointer";
                btnManual.className = "p-2.5 rounded-xl font-bold border-2 border-slate-200 text-slate-600 text-xs cursor-pointer";
                subTitleText.innerText = "📷 기기의 QR코드를 카메라 프레임에 비춰주세요.";
                startQrScanner();
            } else {
                qrContainer.className = "hidden"; manualContainer.className = "block";
                btnManual.className = "p-2.5 rounded-xl font-bold border-2 border-indigo-600 bg-indigo-50 text-indigo-600 text-xs cursor-pointer";
                btnQr.className = "p-2.5 rounded-xl font-bold border-2 border-slate-200 text-slate-600 text-xs cursor-pointer";
                subTitleText.innerText = "⌨️ 기기 고유 ID 숫자를 직접 입력해 주세요.";
                if(html5QrcodeScanner) { html5QrcodeScanner.clear().catch(err => {}); }
            }
        }

        function startQrScanner() {
            if (html5QrcodeScanner && html5QrcodeScanner.getState() === 2) return;
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
            html5QrcodeScanner.render((decodedText) => {
                document.getElementById('scooterId').value = decodedText.toUpperCase().trim();
                switchMode('manual');
            });
        }
        window.onload = startQrScanner;

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('imagePreview'); const placeholder = document.getElementById('uploadPlaceholder');
                preview.src = reader.result; preview.classList.remove('hidden'); placeholder.classList.add('hidden');
                isImageAttached = true;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updateTimeline(step) {
            document.getElementById('timelineBox').classList.remove('hidden');
            const dot1 = document.getElementById('step1Dot'); const dot2 = document.getElementById('step2Dot'); const dot3 = document.getElementById('step3Dot');
            const t1 = document.getElementById('step1Text'); const t2 = document.getElementById('step2Text'); const t3 = document.getElementById('step3Text'); const bar = document.getElementById('timelineProgress');
            [dot1, dot2, dot3].forEach(d => d.className = "w-5 h-5 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold mb-1 text-[10px] transition-all");
            if (step >= 1) { dot1.classList.add('bg-emerald-500'); t1.className = "text-emerald-600 font-bold"; bar.style.width = "0%"; }
            if (step >= 2) { dot2.classList.add('bg-indigo-500'); t2.className = "text-indigo-600 font-bold"; bar.style.width = "50%"; }
            if (step >= 3) { dot3.classList.add('bg-amber-500'); t3.className = "text-amber-600 font-bold"; bar.style.width = "100%"; }
        }

        function submitReport() {
            const scooterId = document.getElementById('scooterId').value.toUpperCase().trim();
            const locationType = document.getElementById('locationType').value;
            const obstructionType = document.getElementById('obstructionType').value;
            const resultBox = document.getElementById('resultBox');
            if(!scooterId) { alert("고유 ID를 입력해 주세요."); return; }

            const baseScore = BASE_WEIGHTS[locationType] || 1;
            const bonusScore = OBSTRUCTION_BONUS[obstructionType] || 0;
            const totalDangerScore = baseScore + bonusScore;

            let brandName = "기타(미분류)"; let fineMessage = ""; let targetRegion = "중앙대 다빈치캠 주변";
            let lat = 37.0118; let lng = 127.2321;

            if (scooterId in last_ride_db) {
                const ride = last_ride_db[scooterId];
                brandName = ride.brand; targetRegion = ride.region; lat = ride.lat; lng = ride.lng;
                fineMessage = `\n🚨 [벌금 부과] 직전 이용자 '${ride.user_id}' 과실 입증 -> 과태료 ${(totalDangerScore * 10000).toLocaleString()}원 강제 청구`;
            }

            const aiLog = isImageAttached ? `\n\n🤖 [AI 검증 완료]\n➔ 번호판 식별 성공 (정확도 98.4%)\n➔ 장애물 교차 분석 완료` : `\n\n⚠️ 사진 누락으로 신뢰도가 하향됩니다.`;
            resultBox.classList.remove('hidden');
            resultBox.innerHTML = `[SYSTEM LOG - SUCCESS]\n\n➔ 분석 소속사: ${brandName} (${targetRegion})\n➔ 최종 합성 위험도: ${totalDangerScore}점\n➔ 결과: [${brandName} 관제소] 실시간 무선 송출 완료.` + fineMessage + aiLog;

            const newTask = {
                scooter_id: scooterId, brand: brandName, region: targetRegion,
                location_type: locationType, obstruction_type: obstructionType,
                danger_score: totalDangerScore, lat: lat, lng: lng, time: new Date().toLocaleTimeString()
            };
            let currentTasks = JSON.parse(localStorage.getItem(brandName)) || [];
            currentTasks.push(newTask);
            currentTasks.sort((a,b) => b.danger_score - a.danger_score);
            localStorage.setItem(brandName, JSON.stringify(currentTasks));

            updateTimeline(2);
            setTimeout(() => { updateTimeline(3); }, 2000);
        }
    </script>
</body>
</html>
