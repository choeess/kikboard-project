<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수거 기사 전용 관제 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 min-h-screen text-slate-100 flex items-center justify-center font-sans selection:bg-indigo-500/30">

    <div id="loginSection" class="w-full max-w-sm mx-auto bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl block m-4">
        <div class="text-center mb-6">
            <h1 class="text-xl font-black text-indigo-400 flex items-center justify-center gap-2">🚚 수거 기사 시스템</h1>
            <p class="text-[11px] text-slate-400 mt-1">소속 구역 수거 관제를 위해 브랜드를 선택하세요.</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">소속 공유 킥보드사</label>
                <select id="driverBrand" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-800 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                    <option value="지쿠(GCOO)">지쿠(GCOO)</option>
                    <option value="씽씽">씽씽</option>
                    <option value="빔(BEAM)">빔(BEAM)</option>
                    <option value="스윙(SWING)">스윙(SWING)</option>
                    <option value="다트(DART)">다트(DART)</option>
                </select>
            </div>
            <button onclick="loginDriver()" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] p-3.5 rounded-xl font-bold text-xs tracking-wide transition-all cursor-pointer shadow-lg shadow-indigo-600/20">
                관제 시스템 앱 접속
            </button>
        </div>
    </div>

    <div id="dashboardSection" class="w-full max-w-md mx-auto min-h-screen bg-slate-950 flex flex-col hidden">
        
        <div class="bg-slate-900 border-b border-slate-800/80 p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
            <div>
                <h1 class="text-base font-black text-slate-100 flex items-center gap-1.5">
                    🛰️ <span id="displayBrandName" class="text-indigo-400"></span> 관제
                </h1>
                <p class="text-[10px] text-slate-500 font-medium">안성 중앙대 다빈치캠 구역</p>
            </div>
            <div class="flex gap-1.5">
                <button onclick="loadTasks()" class="bg-slate-800 active:bg-slate-700 p-2 rounded-lg text-[10px] font-bold cursor-pointer border border-slate-700/50">🔄 갱신</button>
                <button onclick="logoutDriver()" class="bg-slate-800 hover:bg-rose-950/30 text-rose-400 p-2 rounded-lg text-[10px] font-bold cursor-pointer border border-rose-900/30">로그아웃</button>
            </div>
        </div>

        <div class="grid grid-cols-2 bg-slate-900 border-b border-slate-800/60 text-xs font-bold text-center sticky top-[57px] z-40">
            <button onclick="switchTab('tasks')" id="tabTasksBtn" class="py-3 border-b-2 border-indigo-500 text-indigo-400 transition-all cursor-pointer">
                📋 실시간 배정 기기
            </button>
            <button onclick="switchTab('regions')" id="tabRegionsBtn" class="py-3 border-b-2 border-transparent text-slate-500 transition-all cursor-pointer">
                📊 구역별 위험 동향
            </button>
        </div>

        <div class="p-4 flex-1 overflow-y-auto pb-10 space-y-4">
            
            <div id="tabTasksContainer" class="block space-y-3">
                <div id="taskContainer" class="space-y-3"></div>
            </div>

            <div id="tabRegionsContainer" class="hidden space-y-3">
                <div class="text-center py-2 border-b border-dashed border-slate-800">
                    <p class="text-[11px] text-slate-400">지자체 및 인공지능이 분석한 핫스팟 데이터</p>
                </div>
                <div class="space-y-2">
                    <div class="p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl flex justify-between items-center"><span class="text-xs font-bold text-rose-400">🔴 내리 대학가 원룸촌</span><span class="text-[10px] bg-rose-500 text-white px-2 py-0.5 rounded font-black">🛠️ 고위험 밀집</span></div>
                    <div class="p-3 bg-amber-500/10 border border-amber-500/20 rounded-xl flex justify-between items-center"><span class="text-xs font-bold text-amber-400">🟡 중앙대 정문 광장</span><span class="text-[10px] bg-amber-500 text-slate-950 px-2 py-0.5 rounded font-black">⚠️ 주시 등급</span></div>
                    <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl flex justify-between items-center"><span class="text-xs font-bold text-slate-400">⚪ 대덕면 행정센터</span><span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-bold">안전</span></div>
                    <div class="p-3 bg-slate-900 border border-slate-800 rounded-xl flex justify-between items-center"><span class="text-xs font-bold text-slate-400">⚪ 신령리 / 건지리 일대</span><span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded font-bold">안전</span></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentLoggedBrand = "";
        let activeTab = 'tasks';

        function loginDriver() {
            currentLoggedBrand = document.getElementById('driverBrand').value;
            document.body.className = "bg-slate-950 min-h-screen text-slate-100"; // 레이아웃 초기화
            document.getElementById('loginSection').className = "hidden";
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('displayBrandName').innerText = currentLoggedBrand;
            
            switchTab('tasks');
            loadTasks(); 
            window.taskInterval = setInterval(loadTasks, 1500); // 1.5초마다 초고속 폴링
        }

        function logoutDriver() {
            clearInterval(window.taskInterval);
            document.body.className = "bg-slate-950 min-h-screen text-slate-100 flex items-center justify-center";
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('loginSection').className = "w-full max-w-sm mx-auto bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl block m-4";
        }

        // 💡 모바일 전용 상단 탭 전환 알고리즘 함수
        function switchTab(tab) {
            activeTab = tab;
            const tasksContainer = document.getElementById('tabTasksContainer');
            const regionsContainer = document.getElementById('tabRegionsContainer');
            const tasksBtn = document.getElementById('tabTasksBtn');
            const regionsBtn = document.getElementById('tabRegionsBtn');

            if (tab === 'tasks') {
                tasksContainer.classList.replace('hidden', 'block');
                regionsContainer.classList.replace('block', 'hidden');
                tasksBtn.className = "py-3 border-b-2 border-indigo-500 text-indigo-400 transition-all cursor-pointer";
                regionsBtn.className = "py-3 border-b-2 border-transparent text-slate-500 transition-all cursor-pointer";
            } else {
                tasksContainer.classList.replace('block', 'hidden');
                regionsContainer.classList.replace('hidden', 'block');
                regionsBtn.className = "py-3 border-b-2 border-indigo-500 text-indigo-400 transition-all cursor-pointer";
                tasksBtn.className = "py-3 border-b-2 border-transparent text-slate-500 transition-all cursor-pointer";
            }
        }

        function loadTasks() {
            const container = document.getElementById('taskContainer');
            const tasks = JSON.parse(localStorage.getItem(currentLoggedBrand)) || [];
            
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 bg-slate-900/40 rounded-xl border border-dashed border-slate-800 p-4">
                        <p class="text-base mb-0.5">🎉 관할 구역 통제 완료</p>
                        <p class="text-[10px] text-slate-500">대기 중인 불법 주정차 민원이 없습니다.</p>
                    </div>`;
                return;
            }
            
            container.innerHTML = '';
            tasks.forEach((task, index) => {
                let badgeColor = task.danger_score >= 6 ? "bg-rose-500/10 text-rose-400 border-rose-500/20" : "bg-amber-500/10 text-amber-400 border-amber-500/20";
                
                // 모바일 최적화 터치 친화적 카드 컴포넌트 렌더링
                const card = `
                    <div class="bg-slate-900 border border-slate-800/80 rounded-xl p-4 shadow-md flex flex-col justify-between border-l-4 border-l-indigo-500 active:scale-[0.99] transition-all">
                        <div class="space-y-2.5">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] px-2 py-0.5 rounded-full font-black border ${badgeColor}">
                                    위험도 ${task.danger_score}점
                                </span>
                                <span class="text-[10px] text-slate-600 font-mono">${task.time}</span>
                            </div>
                            
                            <div>
                                <h3 class="text-sm font-black text-slate-200 tracking-wide">${task.scooter_id} <span class="text-xs text-slate-400 font-normal">(${task.region})</span></h3>
                                <p class="text-[11px] text-rose-400 font-bold mt-0.5">🚨 현장상황: ${task.obstruction_type}</p>
                            </div>
                            
                            <div class="bg-slate-950/80 p-2.5 rounded-lg text-[10px] font-mono text-slate-500 space-y-0.5 border border-slate-900">
                                <p>📍 위치: ${task.location_type}</p>
                                <p>🌐 좌표: ${task.lat}, ${task.lng}</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 mt-3.5">
                            <a href="https://map.kakao.com/link/to/${task.scooter_id},${task.lat},${task.lng}" target="_blank" class="bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 hover:bg-indigo-600 hover:text-white font-bold py-3 rounded-xl text-center text-[11px] transition-all flex items-center justify-center gap-1 cursor-pointer">🗺️ 내비 길찾기</a>
                            <button onclick="removeTask('${currentLoggedBrand}', ${index})" class="bg-slate-800 hover:bg-emerald-600 active:bg-emerald-700 text-white font-bold py-3 rounded-xl text-[11px] transition-all cursor-pointer">수거 완료</button>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        }

        function removeTask(brand, index) {
            let tasks = JSON.parse(localStorage.getItem(brand)) || [];
            tasks.splice(index, 1);
            localStorage.setItem(brand, JSON.stringify(tasks));
            loadTasks();
        }

        window.addEventListener('storage', (e) => {
            if (currentLoggedBrand) { loadTasks(); }
        });
    </script>
</body>
</html>
